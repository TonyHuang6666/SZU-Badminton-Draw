name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BadmintonDraw.sln --locked-mode

      - name: Build
        run: dotnet build BadmintonDraw.sln --no-restore

      - name: Test
        run: dotnet test BadmintonDraw.sln --no-build --verbosity normal

      - name: Publish smoke test
        run: dotnet publish src\BadmintonDraw.App\BadmintonDraw.App.csproj -c Release -r win-x64 --self-contained true --no-restore /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true
